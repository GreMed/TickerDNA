<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TickerDNA — 财务建模假设工作台</title>
  <style>
    /* Minimal, clean CSS */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa; color: #1a1a2e; line-height: 1.6;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 2rem;
    }
    .container { max-width: 640px; width: 100%; }
    .brand { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .tagline { font-size: 1.1rem; color: #64748b; margin-bottom: 2.5rem; }
    .demo-section { margin-bottom: 2rem; }
    .demo-label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .demo-card {
      padding: 1rem 1.25rem; background: #fff; border: 1px solid #e2e8f0;
      border-radius: 8px; margin-bottom: 0.5rem;
    }
    .demo-card-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.25rem; }
    .demo-card-desc { font-size: 0.85rem; color: #64748b; }
    .cta-button {
      display: inline-block; padding: 0.75rem 2rem; background: #2563eb; color: #fff;
      text-decoration: none; border-radius: 6px; font-weight: 600;
      font-size: 1rem; transition: background 0.2s; margin: 1.5rem 0;
    }
    .cta-button:hover { background: #1d4ed8; }
    .disclaimer {
      font-size: 0.75rem; color: #94a3b8; line-height: 1.5;
      margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e2e8f0;
    }
    @media (max-width: 480px) {
      .brand { font-size: 2rem; }
      .tagline { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="brand">TickerDNA</h1>
    <p class="tagline">基于公开年报和监管文件的财务建模假设工作台</p>

    <div class="demo-section">
      <div class="demo-label">推荐示范案例</div>
      <div class="demo-card">
        <div class="demo-card-title">Apple Inc.（AAPL）</div>
        <div class="demo-card-desc">美股披露 · SEC EDGAR · FY2025 Form 10-K · 产品分部</div>
      </div>
      <div class="demo-card">
        <div class="demo-card-title">腾讯控股（0700.HK）</div>
        <div class="demo-card-desc">港股披露 · 年度报告 · FY2025 · 业务分部</div>
      </div>
    </div>

    <a href="__APP_URL__" class="cta-button">开始体验 TickerDNA</a>

    <div class="disclaimer">
      本工具不是投资建议。所有输出均为基于公开披露和模型估算的假设性预测，不构成任何买入、卖出或持有建议。请结合专业判断使用。历史表现不代表未来结果。
    </div>
  </div>
</body>
</html>
